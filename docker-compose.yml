services:
  media-approval:
    build: .
    container_name: media-approval
    restart: unless-stopped
    security_opt:
      - apparmor=unconfined
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - /media:/media
    entrypoint: ["/bin/sh", "-c", "ln -sfn /media/Torrents/Seed /Torrents/Seed && exec node dist/server.js"]
